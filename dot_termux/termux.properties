# =============================================================================
# TERMUX CONFIGURATION
# =============================================================================
# Unify layout with desktop (Ghostty) and optimize typing space

# Disable the visual/audio bell
bell-character = ignore

# Keep screen awake while Termux is open
enforce-char-based-input = true

# Define two rows of extra keys for efficient navigation and terminal control
# Row 1: Escape and vertical navigation/symbols
# Row 2: Modifiers and horizontal navigation
extra-keys = [[ \
  'ESC', '|', '/', 'HOME', 'UP', 'END', 'PGUP' \
], [ \
  'TAB', 'CTRL', 'ALT', 'LEFT', 'DOWN', 'RIGHT', 'PGDN' \
]]

# Fullscreen mode (hide Android status bar to maximize vertical space)
fullscreen = true

# Font configuration is managed via ~/.termux/font.ttf, but ensure
# we have good cursor blink rates.
terminal-cursor-blink-rate = 600
terminal-cursor-style = bar
