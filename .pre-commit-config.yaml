repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.9.0
    hooks:
      - id: shellcheck
        name: shellcheck
        files: ^run_onchange_.*\.sh\.tmpl$
        # Exclude chezmoi template syntax from shellcheck
        args: ["-e", "SC1009,SC1072,SC1073,SC1054,SC1083"]

  - repo: local
    hooks:
      - id: chezmoi-template-check
        name: Check chezmoi templates
        entry: bash -c 'for f in "$@"; do chezmoi execute-template < "$f" >/dev/null || exit 1; done' --
        language: system
        files: \.tmpl$
        pass_filenames: true
